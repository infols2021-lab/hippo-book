<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — Edu Keys</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fdd835, #f48fb1);
      font-family: 'Poppins', 'Comic Sans MS', cursive, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .login-card {
      background: #fff;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-card h2 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 1.5rem;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }
    .login-card input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #f0f0f0;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    .login-card input:focus {
      border-color: var(--accent2);
      outline: none;
    }
    .btn {
      background: var(--accent2);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(78, 205, 196, 0.3);
    }
    .btn.admin {
      background: var(--accent);
      margin-top: 8px;
    }
    .btn.admin:hover {
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
    }
    .link {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .link a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .error, .success, .warning {
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
      font-size: 14px;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }
    .success {
      background: #e8f5e8;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    .loading {
      display: none;
      margin: 15px 0;
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--accent2);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    .existing-account-help {
      background: #e8f5e8;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
      font-size: 13px;
      text-align: left;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Мобильные стили */
    @media (max-width: 480px) {
      body {
        padding: 15px;
      }
      .login-container {
        max-width: 100%;
      }
      .login-card {
        padding: 20px;
        border-radius: 16px;
      }
      .login-card h2 {
        font-size: 1.3rem;
        margin-bottom: 15px;
      }
      .login-card input {
        padding: 14px 16px;
        font-size: 16px;
      }
      .btn {
        padding: 14px 20px;
        font-size: 16px;
      }
    }
  </style>
  
  <script src="/load-config.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h2>Вход в Edu Keys</h2>
      
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Загружаем конфигурацию...</p>
      </div>
      
      <div id="errorMessage" class="error"></div>
      <div id="successMessage" class="success"></div>
      <div id="warningMessage" class="warning"></div>
      
      <div id="loginForm" style="display: none;">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="example@gmail.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Пароль:</label>
          <input type="password" id="password" placeholder="Введите ваш пароль" autocomplete="current-password">
        </div>

        <button class="btn" id="loginBtn">Войти как ученик</button>
        <button class="btn admin" id="adminLoginBtn">Войти как администратор</button>

        <div class="link">
          <p>Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
          <p><a href="/reset.html">Забыли пароль?</a></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // ========== СУПЕР-НАДЕЖНАЯ СИСТЕМА АУТЕНТИФИКАЦИИ ==========

    // Глобальные переменные для состояния
    let supabase = null;
    let isProcessingConfirmation = false;

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('warningMessage').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }
    
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage');
      successEl.textContent = message;
      successEl.style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('warningMessage').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }

    function showWarning(message) {
      const warningEl = document.getElementById('warningMessage');
      warningEl.textContent = message;
      warningEl.style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }

    // ========== ФУНКЦИЯ СОЗДАНИЯ ПРОФИЛЯ ==========
    async function ensureProfileExists(user) {
      try {
        console.log('🔍 Проверяем существование профиля для:', user.id);
        
        // Проверяем, существует ли профиль
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('id, email, full_name, is_admin')
          .eq('id', user.id)
          .single();

        if (error || !profile) {
          console.log('📝 Профиль не найден, создаем вручную...');
          
          // Создаем профиль вручную
          const { error: insertError } = await supabase
            .from('profiles')
            .insert([
              {
                id: user.id,
                email: user.email,
                full_name: user.user_metadata?.full_name || user.email.split('@')[0],
                created_at: new Date().toISOString(),
                completed_assignments_count: 0,
                is_admin: false
              }
            ]);

          if (insertError) {
            console.error('❌ Ошибка создания профиля:', insertError);
            
            // Если ошибка дубликата, игнорируем (профиль уже создан)
            if (insertError.code === '23505') {
              console.log('⚠️ Профиль уже существует, продолжаем...');
              return true;
            }
            return false;
          }
          
          console.log('✅ Профиль успешно создан');
          return true;
        }
        
        console.log('✅ Профиль уже существует');
        return true;
      } catch (error) {
        console.error('❌ Ошибка проверки профиля:', error);
        return false;
      }
    }

    // ========== ОБРАБОТКА ПОДТВЕРЖДЕНИЯ EMAIL ==========
    async function handleEmailConfirmation() {
      // Проверяем, не обрабатываем ли мы уже подтверждение
      if (isProcessingConfirmation) {
        console.log('⚠️ Подтверждение уже обрабатывается, пропускаем...');
        return false;
      }

      // Проверяем наличие hash параметров в URL
      if (window.location.hash && window.location.hash.includes('access_token')) {
        try {
          isProcessingConfirmation = true;
          console.log('🎯 Начинаем обработку подтверждения email...');
          
          showWarning('🔐 Обрабатываем подтверждение email...');

          const hashParams = new URLSearchParams(window.location.hash.substring(1));
          const accessToken = hashParams.get('access_token');
          const refreshToken = hashParams.get('refresh_token');
          const type = hashParams.get('type');
          const errorDescription = hashParams.get('error_description');

          console.log('📧 Параметры подтверждения:', { 
            type, 
            hasAccessToken: !!accessToken,
            errorDescription 
          });

          // Проверяем наличие ошибок
          if (errorDescription) {
            throw new Error(`Ошибка подтверждения: ${errorDescription}`);
          }

          if (type === 'signup' && accessToken) {
            console.log('🔑 Устанавливаем сессию...');
            
            // Устанавливаем сессию
            const { data, error } = await supabase.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken
            });

            if (error) {
              console.error('❌ Ошибка установки сессии:', error);
              throw new Error(`Ошибка установки сессии: ${error.message}`);
            }

            if (data.user) {
              console.log('👤 Пользователь получен:', data.user.id);
              console.log('📧 Email подтвержден:', data.user.email_confirmed_at);
              
              // Проверяем подтверждение email
              if (data.user.email_confirmed_at || data.user.confirmed_at) {
                console.log('✅ Email подтвержден, создаем профиль...');
                
                // Создаем профиль если нужно
                const profileCreated = await ensureProfileExists(data.user);
                
                if (!profileCreated) {
                  console.warn('⚠️ Не удалось создать профиль, но продолжаем...');
                }

                // ВАЖНО: Выходим из сессии после подтверждения
                console.log('🚪 Выходим из сессии...');
                await supabase.auth.signOut();
                
                // Очищаем URL от hash параметров
                console.log('🧹 Очищаем URL...');
                window.history.replaceState(null, null, window.location.pathname + '?message=confirmed');
                
                // Показываем успешное сообщение
                showSuccess('✅ Email успешно подтвержден! Теперь вы можете войти в систему.');
                
                // Добавляем блок с информацией
                const helpDiv = document.createElement('div');
                helpDiv.className = 'existing-account-help';
                helpDiv.innerHTML = `
                  <strong>🎉 Отлично! Ваш аккаунт активирован.</strong><br>
                  Теперь вы можете войти в систему используя ваш email и пароль.
                `;
                document.getElementById('loginForm').insertBefore(helpDiv, document.getElementById('loginForm').firstChild);
                
                console.log('✅ Подтверждение email завершено успешно');
                return true;
              } else {
                throw new Error('Email не был подтвержден. Проверьте письмо еще раз.');
              }
            } else {
              throw new Error('Пользователь не найден после установки сессии');
            }
          } else {
            console.log('ℹ️ Неподдерживаемый тип подтверждения:', type);
          }
        } catch (error) {
          console.error('❌ Ошибка подтверждения email:', error);
          showError(`❌ Ошибка подтверждения email: ${error.message}`);
          
          // Очищаем URL в случае ошибки
          window.history.replaceState(null, null, window.location.pathname);
          return false;
        } finally {
          isProcessingConfirmation = false;
        }
      }
      return false;
    }

    // ========== ПРОВЕРКА АВТОРИЗАЦИИ И РЕДИРЕКТ ==========
    async function checkUserRoleAndRedirect(user) {
      try {
        console.log('🔍 Проверяем роль пользователя...');
        
        // Убеждаемся, что профиль существует
        await ensureProfileExists(user);
        
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('is_admin')
          .eq('id', user.id)
          .single();
          
        if (error) {
          console.error('❌ Ошибка получения профиля:', error);
          // В случае ошибки редиректим на профиль
          window.location.href = "/profile.html";
          return;
        }
        
        console.log('👑 Роль пользователя:', profile.is_admin ? 'админ' : 'ученик');
        
        if (profile && profile.is_admin) {
          window.location.href = "/admin.html";
        } else {
          window.location.href = "/profile.html";
        }
      } catch (error) {
        console.error('❌ Ошибка проверки роли:', error);
        window.location.href = "/profile.html";
      }
    }

    // ========== ОСНОВНАЯ ФУНКЦИЯ ВХОДА ==========
    async function login(isAdmin) {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Валидация
      if (!email || !password) {
        showError('Введите email и пароль');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Неверный формат email');
        return;
      }

      try {
        // Блокируем кнопки
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('adminLoginBtn').disabled = true;
        showWarning('🔐 Проверяем данные...');
        
        console.log('🔐 Пытаемся войти...', { email, isAdmin });
        
        const { data, error } = await supabase.auth.signInWithPassword({ 
          email, 
          password 
        });
        
        if (error) {
          console.error('❌ Ошибка входа:', error);
          
          // Детальная обработка ошибок
          if (error.message?.includes('Invalid login credentials') || error.code === 'invalid_credentials') {
            showError('❌ Неверный email или пароль. Если вы забыли пароль, воспользуйтесь восстановлением.');
          } else if (error.message?.includes('Email not confirmed') || error.code === 'email_not_confirmed') {
            showError('❌ Email не подтвержден. Проверьте вашу почту и нажмите на ссылку подтверждения в письме.');
            
            const resend = confirm('Отправить письмо с подтверждением повторно?');
            if (resend) {
              showWarning('📧 Отправляем письмо...');
              const { error: resendError } = await supabase.auth.resend({
                type: 'signup',
                email: email
              });
              
              if (!resendError) {
                showSuccess('📧 Письмо с подтверждением отправлено повторно. Проверьте вашу почту.');
              } else {
                showError('❌ Ошибка отправки письма: ' + resendError.message);
              }
            }
          } else if (error.message?.includes('rate limit') || error.code === 'rate_limit_exceeded') {
            showError('⚠️ Слишком много попыток. Попробуйте через несколько минут.');
          } else if (error.message?.includes('User not found')) {
            showError('❌ Пользователь с таким email не найден. Проверьте email или зарегистрируйтесь.');
          } else {
            showError('❌ Ошибка входа: ' + (error.message || 'Неизвестная ошибка'));
          }
          
          // Разблокируем кнопки
          document.getElementById('loginBtn').disabled = false;
          document.getElementById('adminLoginBtn').disabled = false;
          return;
        }

        // Проверяем подтверждение email
        if (data.user && !data.user.email_confirmed_at && !data.user.confirmed_at) {
          showError('❌ Email не подтвержден. Проверьте вашу почту для завершения регистрации.');
          await supabase.auth.signOut();
          document.getElementById('loginBtn').disabled = false;
          document.getElementById('adminLoginBtn').disabled = false;
          return;
        }

        console.log('✅ Вход успешен:', data.user.id);
        
        // Убеждаемся, что профиль существует
        await ensureProfileExists(data.user);

        // Проверка прав администратора
        if (isAdmin) {
          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('is_admin')
            .eq('id', data.user.id)
            .single();
            
          if (profileError) {
            console.error('❌ Ошибка проверки прав:', profileError);
            showError('❌ Ошибка проверки прав доступа');
            await supabase.auth.signOut();
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('adminLoginBtn').disabled = false;
            return;
          }
          
          if (profile && profile.is_admin) {
            console.log('👑 Редирект в админку...');
            window.location.href = "/admin.html";
          } else {
            showError('❌ У вас нет прав администратора');
            await supabase.auth.signOut();
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('adminLoginBtn').disabled = false;
          }
        } else {
          console.log('🎓 Редирект в профиль...');
          window.location.href = "/profile.html";
        }
      } catch (error) {
        console.error('❌ Неожиданная ошибка входа:', error);
        showError('❌ Неожиданная ошибка: ' + error.message);
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('adminLoginBtn').disabled = false;
      }
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ==========
    async function initApp() {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        showError('❌ Ошибка конфигурации системы');
        return;
      }
      
      console.log('🚀 Инициализация приложения...');
      
      try {
        // Импортируем Supabase
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        
        console.log('✅ Supabase клиент создан');

        // Показываем форму
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        
        // Обрабатываем параметры URL
        const urlParams = new URLSearchParams(window.location.search);
        const message = urlParams.get('message');
        
        console.log('📨 Параметры URL:', { message });
        
        if (message === 'confirmed') {
          showSuccess('✅ Email успешно подтвержден! Теперь вы можете войти в систему.');
        } else if (message === 'check_email') {
          showWarning('📧 Проверьте вашу почту для подтверждения регистрации.');
        } else if (message === 'email_exists') {
          showError('❌ Пользователь с таким email уже зарегистрирован. Войдите в существующий аккаунт или используйте другой email.');
        } else if (message === 'password_reset') {
          showSuccess('✅ Пароль успешно изменен! Теперь вы можете войти с новым паролем.');
        }
        
        // Обрабатываем подтверждение email
        const confirmationHandled = await handleEmailConfirmation();
        
        // Если подтверждение не обработано, проверяем текущую авторизацию
        if (!confirmationHandled) {
          const { data: { user } } = await supabase.auth.getUser();
          if (user) {
            console.log('👤 Пользователь уже авторизован:', user.id);
            await checkUserRoleAndRedirect(user);
          }
        }
        
        // Назначаем обработчики событий
        document.getElementById('loginBtn').addEventListener('click', () => login(false));
        document.getElementById('adminLoginBtn').addEventListener('click', () => login(true));

        // Поддержка Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') login(false);
        });

        document.getElementById('email').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') document.getElementById('password').focus();
        });
        
        console.log('✅ Приложение инициализировано');
        
      } catch (error) {
        console.error('❌ Ошибка инициализации:', error);
        showError('❌ Ошибка загрузки системы: ' + error.message);
      }
    }

    // ========== ЗАПУСК ПРИЛОЖЕНИЯ ==========
    if (window.SUPABASE_URL) {
      initApp();
    } else {
      console.log('⏳ Ожидаем загрузку конфигурации...');
      
      const timeout = setTimeout(() => {
        showError('❌ Таймаут загрузки конфигурации');
      }, 5000);
      
      window.addEventListener('configLoaded', () => {
        clearTimeout(timeout);
        console.log('✅ Конфигурация загружена, запускаем приложение...');
        initApp();
      });
    }

    // Дополнительная проверка на случай проблем с конфигурацией
    setTimeout(() => {
      if (!window.SUPABASE_URL && document.getElementById('loading').style.display !== 'none') {
        showError('❌ Не удалось загрузить конфигурацию. Пожалуйста, обновите страницу.');
      }
    }, 3000);

  </script>
</body>
</html>
