<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание - Edu Keys</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/load-config.js"></script>
    <style>
        .assignment-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .question-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 26px rgba(0,0,0,0.08);
        }
        .question-number {
            font-size: 14px;
            color: var(--accent2);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .question-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin: 16px 0;
            display: block;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--bg1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option-label:hover {
            background: rgba(78, 205, 196, 0.1);
        }
        .option-label.selected {
            border-color: var(--accent2);
            background: rgba(78, 205, 196, 0.15);
        }
        .option-radio {
            margin-right: 12px;
        }
        .fill-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--bg1);
            border-radius: 12px;
            font-size: 16px;
            margin: 10px 0;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--bg1);
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg1);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent2);
            transition: width 0.3s ease;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .completion-message {
            text-align: center;
            padding: 40px 20px;
        }
        .score-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent2);
            margin: 20px 0;
        }
        .btn-finish {
            background: var(--accent2);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="btn secondary" onclick="location.href='/profile.html'">← Назад</button>
            <h1>Задание</h1>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загружаем задание...</p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div id="assignmentContent" style="display: none;">
            <div class="assignment-container">
                <div class="card">
                    <h2 id="assignmentTitle">Название задания</h2>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #666;">
                        <span>Прогресс: <span id="progressText">0</span>%</span>
                        <span>Вопрос <span id="currentQuestion">1</span> из <span id="totalQuestions">0</span></span>
                    </div>

                    <div id="questionsContainer"></div>

                    <div class="navigation">
                        <button class="btn secondary" id="prevBtn" style="display: none;">← Назад</button>
                        <button class="btn" id="nextBtn">Далее →</button>
                        <button class="btn-finish" id="finishBtn" style="display: none;">Завершить задание</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="completionScreen" class="completion-message" style="display: none;">
            <div class="card">
                <h2>🎉 Задание завершено!</h2>
                <div class="score-display" id="finalScore">0%</div>
                <p id="completionMessage"></p>
                <div style="margin-top: 30px;">
                    <button class="btn" onclick="location.href='/profile.html'">Вернуться в профиль</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Простая функция для показа ошибок
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            console.error('Ошибка:', message);
        }

        // Основная функция инициализации
        async function initAssignment() {
            try {
                console.log('🚀 Начинаем загрузку задания...');

                // Ждем конфигурацию если нужно
                if (!window.SUPABASE_URL) {
                    console.log('⏳ Ожидаем конфигурацию...');
                    await window.CONFIG_READY;
                }

                // Импортируем Supabase
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
                const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                console.log('✅ Supabase подключен');

                // Проверяем авторизацию
                const { data: { user }, error: authError } = await supabase.auth.getUser();
                if (authError || !user) {
                    window.location.href = '/login.html';
                    return;
                }
                console.log('✅ Пользователь авторизован:', user.email);

                // Получаем ID задания из URL
                const urlParams = new URLSearchParams(window.location.search);
                const assignmentId = urlParams.get('id');
                
                if (!assignmentId) {
                    showError('ID задания не указан в URL');
                    return;
                }

                console.log('📝 Загружаем задание ID:', assignmentId);

                // Загружаем задание
                const { data: assignment, error: assignmentError } = await supabase
                    .from('assignments')
                    .select('*')
                    .eq('id', assignmentId)
                    .single();

                if (assignmentError) {
                    throw new Error('Не удалось загрузить задание: ' + assignmentError.message);
                }

                if (!assignment) {
                    throw new Error('Задание не найдено');
                }

                const questions = assignment.content?.questions || [];
                console.log('✅ Задание загружено:', assignment.title, 'Вопросов:', questions.length);

                if (questions.length === 0) {
                    throw new Error('В задании нет вопросов');
                }

                // Загружаем прогресс пользователя
                let userAnswers = {};
                const { data: progress } = await supabase
                    .from('user_progress')
                    .select('answers')
                    .eq('user_id', user.id)
                    .eq('assignment_id', assignmentId)
                    .maybeSingle();

                if (progress && progress.answers) {
                    userAnswers = progress.answers;
                    console.log('✅ Прогресс загружен');
                }

                // Показываем задание
                showAssignment(assignment, questions, userAnswers, supabase, user);

            } catch (error) {
                console.error('❌ Критическая ошибка:', error);
                showError(error.message);
            }
        }

        // Функция показа задания
        function showAssignment(assignment, questions, userAnswers, supabase, user) {
            // Скрываем загрузку, показываем контент
            document.getElementById('loading').style.display = 'none';
            document.getElementById('assignmentContent').style.display = 'block';
            
            // Устанавливаем заголовок
            document.getElementById('assignmentTitle').textContent = assignment.title;
            document.getElementById('totalQuestions').textContent = questions.length;

            let currentQuestionIndex = 0;

            // Функция показа вопроса
            function showQuestion(index) {
                if (index < 0 || index >= questions.length) return;
                currentQuestionIndex = index;
                
                const question = questions[index];
                const container = document.getElementById('questionsContainer');
                
                // Очищаем контейнер
                container.innerHTML = '';
                
                // Создаем карточку вопроса
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';
                
                // Заголовок вопроса
                questionCard.innerHTML = `
                    <div class="question-number">Вопрос ${index + 1} из ${questions.length}</div>
                    <div class="question-text">${question.q || 'Вопрос без текста'}</div>
                `;
                
                // Изображение вопроса
                if (question.image) {
                    const img = document.createElement('img');
                    img.src = question.image;
                    img.alt = 'Изображение вопроса';
                    img.className = 'question-image';
                    img.onerror = () => img.style.display = 'none';
                    questionCard.appendChild(img);
                }
                
                // Варианты ответов для тестового вопроса
                if (question.type === 'test' && question.options) {
                    const optionsContainer = document.createElement('div');
                    optionsContainer.className = 'options-container';
                    
                    question.options.forEach((option, optionIndex) => {
                        const label = document.createElement('label');
                        label.className = `option-label ${userAnswers[index] === optionIndex ? 'selected' : ''}`;
                        
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = `question-${index}`;
                        radio.value = optionIndex;
                        radio.className = 'option-radio';
                        radio.checked = userAnswers[index] === optionIndex;
                        
                        radio.addEventListener('change', async () => {
                            userAnswers[index] = optionIndex;
                            document.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                            label.classList.add('selected');
                            await saveProgress();
                            updateProgress();
                        });
                        
                        label.appendChild(radio);
                        label.appendChild(document.createTextNode(option));
                        optionsContainer.appendChild(label);
                    });
                    
                    questionCard.appendChild(optionsContainer);
                }
                // Поле для ввода ответа
                else if (question.type === 'fill') {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'fill-input';
                    input.placeholder = 'Введите ваш ответ...';
                    input.value = userAnswers[index] || '';
                    
                    input.addEventListener('input', async () => {
                        userAnswers[index] = input.value;
                        await saveProgress();
                        updateProgress();
                    });
                    
                    questionCard.appendChild(input);
                }
                
                container.appendChild(questionCard);
                
                // Обновляем навигацию
                document.getElementById('currentQuestion').textContent = index + 1;
                document.getElementById('prevBtn').style.display = index > 0 ? 'block' : 'none';
                document.getElementById('nextBtn').style.display = index < questions.length - 1 ? 'block' : 'none';
                document.getElementById('finishBtn').style.display = index === questions.length - 1 ? 'block' : 'none';
                
                updateProgress();
            }

            // Функция сохранения прогресса
            async function saveProgress() {
                try {
                    const progressData = {
                        user_id: user.id,
                        assignment_id: assignment.id,
                        answers: userAnswers,
                        is_completed: false,
                        score: 0
                    };

                    // Проверяем существующий прогресс
                    const { data: existing } = await supabase
                        .from('user_progress')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('assignment_id', assignment.id)
                        .maybeSingle();

                    if (existing) {
                        await supabase
                            .from('user_progress')
                            .update(progressData)
                            .eq('id', existing.id);
                    } else {
                        await supabase
                            .from('user_progress')
                            .insert(progressData);
                    }
                } catch (error) {
                    console.error('Ошибка сохранения:', error);
                }
            }

            // Функция обновления прогресса
            function updateProgress() {
                const answeredCount = Object.keys(userAnswers).filter(key => 
                    userAnswers[key] !== undefined && userAnswers[key] !== '' && userAnswers[key] !== null
                ).length;
                
                const progress = (answeredCount / questions.length) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = Math.round(progress);
            }

            // Функция завершения задания
            async function finishAssignment() {
                try {
                    const score = calculateScore();
                    const progressData = {
                        user_id: user.id,
                        assignment_id: assignment.id,
                        answers: userAnswers,
                        is_completed: true,
                        completed_at: new Date().toISOString(),
                        score: score
                    };

                    const { data: existing } = await supabase
                        .from('user_progress')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('assignment_id', assignment.id)
                        .maybeSingle();

                    if (existing) {
                        await supabase
                            .from('user_progress')
                            .update(progressData)
                            .eq('id', existing.id);
                    } else {
                        await supabase
                            .from('user_progress')
                            .insert(progressData);
                    }

                    // Показываем экран завершения
                    document.getElementById('assignmentContent').style.display = 'none';
                    document.getElementById('completionScreen').style.display = 'block';
                    document.getElementById('finalScore').textContent = `${score}%`;
                    
                    if (score >= 80) {
                        document.getElementById('completionMessage').textContent = 'Отличный результат!';
                    } else if (score >= 60) {
                        document.getElementById('completionMessage').textContent = 'Хороший результат!';
                    } else {
                        document.getElementById('completionMessage').textContent = 'Попробуйте еще раз!';
                    }

                } catch (error) {
                    console.error('Ошибка завершения:', error);
                    alert('Ошибка при сохранении результата');
                }
            }

            // Функция расчета оценки
            function calculateScore() {
                let correctAnswers = 0;
                
                questions.forEach((question, index) => {
                    if (userAnswers[index] !== undefined) {
                        if (question.type === 'test') {
                            if (parseInt(userAnswers[index]) === question.correct) {
                                correctAnswers++;
                            }
                        } else if (question.type === 'fill') {
                            const userAnswer = String(userAnswers[index]).toLowerCase().trim();
                            const correctAnswersList = question.answers.map(a => String(a).toLowerCase().trim());
                            if (correctAnswersList.includes(userAnswer)) {
                                correctAnswers++;
                            }
                        }
                    }
                });
                
                return Math.round((correctAnswers / questions.length) * 100);
            }

            // Обработчики кнопок
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    showQuestion(currentQuestionIndex - 1);
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (currentQuestionIndex < questions.length - 1) {
                    showQuestion(currentQuestionIndex + 1);
                }
            });

            document.getElementById('finishBtn').addEventListener('click', finishAssignment);

            // Показываем первый вопрос
            showQuestion(0);

            console.log('✅ Задание полностью загружено и отображено');
        }

        // Запускаем инициализацию
        initAssignment();
    </script>
</body>
</html>
