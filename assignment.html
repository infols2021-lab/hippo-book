<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Задание — Edu Keys</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page {
      width: 95%;
      max-width: 1000px;
      margin: 20px auto;
    }

    .header-crumbs {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .crumbs {
      font-size: 14px;
      color: #666;
    }

    .title-card {
      background: linear-gradient(135deg, #42a5f5, #26c6da);
      color: #fff;
      padding: 18px 20px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    .title-card h2 {
      margin: 0 0 6px 0;
      font-size: 1.6rem;
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      opacity: .95;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.28);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
      backdrop-filter: blur(2px);
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 16px;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--accent2);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { 0% { transform: rotate(0) } 100% { transform: rotate(360deg) } }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 16px;
      border-radius: 8px;
      display: none;
      margin-bottom: 12px;
      border: 1px solid #ffcdd2;
    }

    .success {
      background: #e8f5e8;
      color: #2e7d32;
      padding: 14px;
      border-radius: 8px;
      display: none;
      margin-bottom: 12px;
      border: 1px solid #c8e6c9;
    }

    .question {
      display: grid;
      gap: 12px;
    }

    .q-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: #333;
    }

    .q-image {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background: #fafafa;
      border: 1px solid #eee;
    }
    .q-image img { width: 100%; height: auto; display: block; }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: flex-start;
      border: 2px solid #f0f0f0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .02s;
      background: #fff;
    }

    .choice:hover { border-color: var(--accent2); box-shadow: 0 6px 16px rgba(0,0,0,.05); }
    .choice input { margin-top: 3px; }

    .choice .content { display: grid; gap: 8px; }
    .choice .content .text { color: #333; }

    .choice .thumb { border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
    .choice .thumb img { width: 100%; height: auto; display: block; }

    .answer-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color .2s;
    }
    .answer-input:focus { outline: none; border-color: var(--accent2); }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .btn.primary { background: var(--accent2); color: #fff; }
    .btn.secondary { background: #eceff1; color: #37474f; }
    .btn {
      border: 0;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.08); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .result {
      margin-top: 10px;
      font-weight: 600;
    }

    .muted { color: #666; font-size: 13px; }

    @media (max-width: 768px) {
      .title-card h2 { font-size: 1.3rem; }
    }
  </style>

  <!-- ВАЖНО: корректное имя файла конфигурации -->
  <script src="/load-config.js"></script>
</head>
<body>
  <div class="page">
    <div class="header-crumbs">
      <div class="crumbs" id="crumbs">Задание</div>
      <div>
        <button class="btn secondary" id="backBtn">← Назад</button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Загружаем задание…</p>
    </div>

    <div id="errorMessage" class="error"></div>
    <div id="successMessage" class="success"></div>

    <div id="content" style="display:none">
      <div class="title-card">
        <h2 id="assignmentTitle">Название задания</h2>
        <div class="meta">
          <span class="badge" id="typeBadge">📝 Тип: —</span>
          <span class="badge" id="progressBadge">📊 Статус: —</span>
        </div>
      </div>

      <div class="card">
        <div class="question" id="questionBox">
          <!-- Вопрос рендерится из JS -->
        </div>

        <div class="actions">
          <div class="muted" id="hint"></div>
          <div>
            <button class="btn secondary" id="skipBtn">Пропустить</button>
            <button class="btn primary" id="submitBtn">Отправить</button>
          </div>
        </div>

        <div class="result" id="resultBox"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // ==================== ХЕЛПЕРЫ ДЛЯ КАРТИНОК (обложки/вопросы/варианты) ====================
    function isHttpUrl(v) {
      return typeof v === 'string' && /^https?:\/\//i.test(v);
    }
    function resolvePublicUrl(value, bucket) {
      if (!value) return null;
      if (isHttpUrl(value)) return value;
      // приводим возможный путь формата "folder/file.png" к публичному URL
      const key = String(value).replace(/^\/+/, '').replace(/^storage\/v1\/object\/public\/[^/]+\//,'');
      const v = Date.now(); // для обхода кэша
      return `${window.SUPABASE_URL}/storage/v1/object/public/${bucket}/${encodeURIComponent(key)}?v=${v}`;
    }
    function imgEl(url, alt='') {
      const wrap = document.createElement('div');
      wrap.className = 'thumb';
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = url;
      img.alt = alt;
      wrap.appendChild(img);
      return wrap;
    }

    // ==================== UI ХЕЛПЕРЫ ====================
    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }
    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }
    function hideBanners() {
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('errorMessage').style.display = 'none';
    }
    function showContent() {
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      hideBanners();
    }

    document.getElementById('loading').style.display = 'block';

    // ==================== ОСНОВНАЯ ЛОГИКА ====================
    async function init() {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        showError('❌ Ошибка конфигурации. Переменные Supabase не загружены.');
        return;
      }

      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
      const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        location.href = '/login.html';
        return;
      }

      const params = new URLSearchParams(location.search);
      const assignmentId = params.get('id');
      const source = params.get('source') || '';      // textbook | crossword | ''
      const sourceId = params.get('sourceId') || '';  // id учебника/кроссворда

      if (!assignmentId) {
        showError('❌ Задание не указано.');
        return;
      }

      // Кнопка "назад"
      const backBtn = document.getElementById('backBtn');
      backBtn.onclick = () => {
        if (source === 'textbook' && sourceId) {
          location.href = `/textbook.html?id=${sourceId}`;
        } else if (source === 'crossword' && sourceId) {
          location.href = `/crossword.html?id=${sourceId}`;
        } else {
          location.href = '/materials.html';
        }
      };

      let assignment = null;
      let already = null; // существующая строка прогресса

      try {
        // 1) Получаем задание
        const { data: aData, error: aErr } = await supabase
          .from('assignments')
          .select('*')
          .eq('id', assignmentId)
          .single();
        if (aErr) throw aErr;
        assignment = aData;

        // 2) Проверяем доступ (если пришли напрямую по ссылке)
        // — доступ к учебнику
        if (assignment.textbook_id) {
          // Если учебник закрыт — проверим явный доступ
          const { data: tb } = await supabase.from('textbooks').select('id,is_available').eq('id', assignment.textbook_id).single();
          if (tb && !tb.is_available) {
            const { data: acc } = await supabase
              .from('textbook_access')
              .select('id')
              .eq('user_id', user.id)
              .eq('textbook_id', assignment.textbook_id)
              .maybeSingle();
            if (!acc) {
              showError('🔒 У вас нет доступа к этому заданию (учебник закрыт). Обратитесь к администратору.');
              return;
            }
          }
        }
        // — доступ к кроссворду
        if (assignment.crossword_id) {
          const { data: cw } = await supabase.from('crosswords').select('id,is_available').eq('id', assignment.crossword_id).single();
          if (cw && !cw.is_available) {
            const { data: acc } = await supabase
              .from('crossword_access')
              .select('id')
              .eq('user_id', user.id)
              .eq('crossword_id', assignment.crossword_id)
              .maybeSingle();
            if (!acc) {
              showError('🔒 У вас нет доступа к этому заданию (кроссворд закрыт). Обратитесь к администратору.');
              return;
            }
          }
        }

        // 3) Тянем существующий прогресс (если есть)
        const { data: upData, error: upErr } = await supabase
          .from('user_progress')
          .select('*')
          .eq('user_id', user.id)
          .eq('assignment_id', assignmentId)
          .maybeSingle();
        if (upErr && upErr.code !== 'PGRST116') throw upErr;
        already = upData || null;
      } catch (e) {
        console.error('Load assignment error:', e);
        showError('❌ Ошибка загрузки задания: ' + (e.message || 'неизвестно'));
        return;
      }

      renderAssignment(assignment, already);

      // Обработчики
      document.getElementById('submitBtn').onclick = () => submitAnswers(supabase, user, assignment, already);
      document.getElementById('skipBtn').onclick = () => {
        // Позволим вернуться, не сохраняя
        backBtn.click();
      };

      showContent();
    }

    // РЕНДЕР
    function renderAssignment(assignment, already) {
      const content = assignment?.content || {};
      const questions = Array.isArray(content?.questions) ? content.questions : [];
      const first = questions[0] || {};

      // Тип
      const aType = first?.type || assignment?.type || 'test'; // test | fill | sentence

      // Наверху
      document.getElementById('assignmentTitle').textContent = assignment.title || 'Задание';
      document.getElementById('crumbs').textContent =
        (assignment.textbook_id ? 'Учебник → ' : (assignment.crossword_id ? 'Кроссворд → ' : 'Материалы → ')) +
        (assignment.title || 'Задание');

      const typeBadge = document.getElementById('typeBadge');
      typeBadge.textContent = '📝 Тип: ' + (aType === 'fill' ? 'Ввод ответа' : (aType === 'sentence' ? 'Заполнение предложения' : 'Тест'));

      const progressBadge = document.getElementById('progressBadge');
      progressBadge.textContent = '📊 Статус: ' + (already?.is_completed ? 'выполнено' : 'не выполнено');

      const questionBox = document.getElementById('questionBox');
      questionBox.innerHTML = '';

      // Заголовок вопроса
      if (first?.text) {
        const qTitle = document.createElement('div');
        qTitle.className = 'q-title';
        qTitle.textContent = first.text;
        questionBox.appendChild(qTitle);
      }

      // Изображение вопроса (если есть)
      if (first?.image_url) {
        const url = resolvePublicUrl(first.image_url, 'assignment-images');
        if (url) {
          const wrap = document.createElement('div');
          wrap.className = 'q-image';
          wrap.appendChild(imgEl(url, 'Изображение к вопросу'));
          questionBox.appendChild(wrap);
        }
      }

      // Рендер по типу
      if (aType === 'test') {
        const choicesWrap = document.createElement('div');
        choicesWrap.className = 'choices';

        (first?.options || []).forEach((opt, idx) => {
          const label = document.createElement('label');
          label.className = 'choice';
          label.setAttribute('data-index', String(idx));

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'answer';
          input.value = String(idx);

          const content = document.createElement('div');
          content.className = 'content';

          if (opt?.text) {
            const t = document.createElement('div');
            t.className = 'text';
            t.textContent = opt.text;
            content.appendChild(t);
          }
          if (opt?.image_url) {
            const url = resolvePublicUrl(opt.image_url, 'assignment-images');
            if (url) content.appendChild(imgEl(url, 'Вариант ответа'));
          }

          label.appendChild(input);
          label.appendChild(content);
          choicesWrap.appendChild(label);
        });

        questionBox.appendChild(choicesWrap);
        document.getElementById('hint').textContent = 'Выберите вариант и нажмите «Отправить».';
      } else if (aType === 'fill') {
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'fillAnswer';
        input.className = 'answer-input';
        input.placeholder = 'Введите ответ';
        questionBox.appendChild(input);
        document.getElementById('hint').textContent = 'Введите ответ и нажмите «Отправить».';
      } else { // sentence как подтип ввода
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'fillAnswer';
        input.className = 'answer-input';
        input.placeholder = 'Введите недостающее слово(а)';
        questionBox.appendChild(input);
        document.getElementById('hint').textContent = 'Дополните предложение и нажмите «Отправить».';
      }

      // Если задание уже выполнено — мягкий показ
      if (already?.is_completed) {
        const result = document.getElementById('resultBox');
        result.style.color = '#2e7d32';
        result.textContent = '✅ Задание уже отмечено как выполненное.';
      }
    }

    // ПРОВЕРКА И СОХРАНЕНИЕ
    async function submitAnswers(supabase, user, assignment, already) {
      hideBanners();

      const content = assignment?.content || {};
      const questions = Array.isArray(content?.questions) ? content.questions : [];
      const first = questions[0] || {};
      const aType = first?.type || assignment?.type || 'test';

      // Собираем ответ
      let isCorrect = true;     // если нет ключа — считаем как выполнено без оценки
      let givenAnswer = null;   // то, что отправим в БД (для истории)
      let score = null;

      if (aType === 'test') {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) {
          showError('Выберите вариант ответа.');
          return;
        }
        const idx = Number(selected.value);
        givenAnswer = { type: 'test', selectedIndex: idx };

        const correctIndex = typeof first.correctIndex === 'number' ? first.correctIndex : null;
        if (correctIndex !== null) {
          isCorrect = (idx === correctIndex);
          score = isCorrect ? 1 : 0;
        }
      } else {
        const val = (document.getElementById('fillAnswer')?.value || '').trim();
        if (!val) {
          showError('Введите ответ.');
          return;
        }
        givenAnswer = { type: aType, text: val };

        const correct = String(first.correct || '').trim();
        if (correct) {
          // сравнение без учета регистра/пробелов
          isCorrect = correct.toLowerCase() === val.toLowerCase();
          score = isCorrect ? 1 : 0;
        }
      }

      // Пишем прогресс.
      // ВАЖНО ДЛЯ RLS: всегда передаём user_id = auth.uid()!
      const payload = {
        user_id: user.id,
        assignment_id: assignment.id,
        is_completed: true,
        score: score,
        answers: givenAnswer ? JSON.stringify(givenAnswer) : null,
        updated_at: new Date().toISOString()
      };

      // Если в таблице есть столбец "source" / "source_id", можно проставить (не обязательно)
      if (assignment.textbook_id) {
        payload.source = 'textbook';
        payload.source_id = assignment.textbook_id;
      } else if (assignment.crossword_id) {
        payload.source = 'crossword';
        payload.source_id = assignment.crossword_id;
      }

      // Сохраняем с onConflict по (user_id, assignment_id)
      try {
        disableButtons(true);
        const { error } = await supabase
          .from('user_progress')
          .upsert(payload, { onConflict: 'user_id,assignment_id' });

        if (error) {
          // Частая причина: RLS запрещает вставку, когда не указан user_id или политика ожидает auth.uid()
          if (String(error.message || '').toLowerCase().includes('row-level security')) {
            showError('❌ Ошибка при завершении: политика безопасности не разрешила запись. Убедитесь, что в таблице user_progress есть политика INSERT вида: user_id = auth.uid().');
          } else {
            showError('❌ Ошибка при сохранении прогресса: ' + error.message);
          }
          disableButtons(false);
          return;
        }

        // UI-результат
        const res = document.getElementById('resultBox');
        res.style.color = isCorrect ? '#2e7d32' : '#c62828';
        res.textContent = isCorrect ? '✅ Ответ принят! Задание отмечено как выполненное.' : 'ℹ️ Ответ сохранён, задание отмечено как выполненное.';

        showSuccess('✅ Прогресс сохранён!');

        // Обновим бейдж
        document.getElementById('progressBadge').textContent = '📊 Статус: выполнено';

        // Кнопка назад через короткую паузу
        setTimeout(() => {
          const btn = document.getElementById('backBtn');
          btn.click();
        }, 1200);

      } catch (e) {
        console.error('Submit error:', e);
        showError('❌ Неожиданная ошибка сохранения: ' + (e.message || 'неизвестно'));
        disableButtons(false);
      }
    }

    function disableButtons(state) {
      document.getElementById('submitBtn').disabled = state;
      document.getElementById('skipBtn').disabled = state;
      document.getElementById('backBtn').disabled = state;
    }

    if (window.SUPABASE_URL) {
      init().catch(err => showError('❌ Ошибка инициализации: ' + (err.message || 'неизвестно')));
    } else {
      window.addEventListener('configLoaded', () => {
        init().catch(err => showError('❌ Ошибка инициализации: ' + (err.message || 'неизвестно')));
      });
    }
  </script>
</body>
</html>
