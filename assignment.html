<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание - Edu Keys</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/load-config.js"></script>
    <style>
        .assignment-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .question-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 26px rgba(0,0,0,0.08);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .question-number {
            font-size: 14px;
            color: var(--accent2);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .question-image {
            max-width: 100%;
            border-radius: 12px;
            margin: 16px 0;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--bg1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option-label:hover {
            background: rgba(78, 205, 196, 0.1);
        }
        .option-label.selected {
            border-color: var(--accent2);
            background: rgba(78, 205, 196, 0.15);
        }
        .option-radio {
            margin-right: 12px;
        }
        .fill-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--bg1);
            border-radius: 12px;
            font-size: 16px;
            margin: 10px 0;
        }
        .fill-input:focus {
            border-color: var(--accent2);
            outline: none;
        }
        .sentence-container {
            background: var(--bg1);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .sentence-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .sentence-gap {
            display: inline-block;
            min-width: 120px;
            margin: 0 5px;
        }
        .sentence-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--bg1);
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg1);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent2);
            transition: width 0.3s ease;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .completion-message {
            text-align: center;
            padding: 40px 20px;
        }
        .score-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent2);
            margin: 20px 0;
        }
        .btn-finish {
            background: var(--accent2);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-finish:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.3);
        }
        .btn-finish:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .assignment-container {
                padding: 0 15px;
                margin: 10px auto;
            }
            .question-card {
                padding: 16px;
            }
            .question-text {
                font-size: 16px;
            }
            .option-label {
                padding: 12px;
            }
            .sentence-input {
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="btn secondary" onclick="location.href='/profile.html'">← Назад</button>
            <h1 id="pageTitle">Задание</h1>
            <div id="userInfo"></div>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загружаем задание...</p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div id="assignmentContent" style="display: none;">
            <div class="assignment-container">
                <div class="card">
                    <h2 id="assignmentTitle"></h2>
                    <div id="assignmentDescription"></div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #666;">
                        <span>Прогресс: <span id="progressText">0</span>%</span>
                        <span>Вопрос <span id="currentQuestion">1</span> из <span id="totalQuestions">0</span></span>
                    </div>

                    <div id="questionsContainer"></div>

                    <div class="navigation">
                        <button class="btn secondary" id="prevBtn" style="display: none;">← Назад</button>
                        <button class="btn" id="nextBtn">Далее →</button>
                        <button class="btn-finish" id="finishBtn" style="display: none;">Завершить задание</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="completionScreen" class="completion-message" style="display: none;">
            <div class="card">
                <h2>🎉 Задание завершено!</h2>
                <div class="score-display" id="finalScore">0%</div>
                <p id="completionMessage"></p>
                <div style="margin-top: 30px;">
                    <button class="btn" onclick="location.href='/profile.html'">Вернуться в профиль</button>
                    <button class="btn secondary" onclick="location.reload()">Пройти заново</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Ждем загрузки конфигурации
        await window.CONFIG_READY;
        
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const assignmentId = urlParams.get('id');
        
        if (!assignmentId) {
            showError('ID задания не указан');
            return;
        }

        let assignment = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let userProgressId = null;

        // Элементы DOM
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('errorMessage');
        const contentEl = document.getElementById('assignmentContent');
        const completionEl = document.getElementById('completionScreen');
        const assignmentTitleEl = document.getElementById('assignmentTitle');
        const questionsContainerEl = document.getElementById('questionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const progressFillEl = document.getElementById('progressFill');
        const progressTextEl = document.getElementById('progressText');
        const currentQuestionEl = document.getElementById('currentQuestion');
        const totalQuestionsEl = document.getElementById('totalQuestions');
        const finalScoreEl = document.getElementById('finalScore');
        const completionMessageEl = document.getElementById('completionMessage');

        // Проверяем аутентификацию
        const { data: { user }, error: authError } = await supabase.auth.getUser();
        if (authError || !user) {
            window.location.href = '/login.html';
            return;
        }

        // Загружаем задание
        async function loadAssignment() {
            try {
                const { data, error } = await supabase
                    .from('assignments')
                    .select('*')
                    .eq('id', assignmentId)
                    .single();

                if (error) throw error;

                assignment = data;
                questions = data.content?.questions || [];
                
                if (questions.length === 0) {
                    throw new Error('В задании нет вопросов');
                }

                // Загружаем прогресс пользователя
                await loadUserProgress();

                renderAssignment();
                showQuestion(0);

            } catch (error) {
                console.error('Ошибка загрузки задания:', error);
                showError('Не удалось загрузить задание: ' + error.message);
            }
        }

        // Загружаем прогресс пользователя
        async function loadUserProgress() {
            try {
                const { data, error } = await supabase
                    .from('user_progress')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('assignment_id', assignmentId)
                    .single();

                if (data && !error) {
                    userProgressId = data.id;
                    userAnswers = data.answers || {};
                }
            } catch (error) {
                console.log('Прогресс не найден, создадим новый');
            }
        }

        // Сохраняем прогресс
        async function saveProgress(isCompleted = false) {
            try {
                const progressData = {
                    user_id: user.id,
                    assignment_id: assignmentId,
                    answers: userAnswers,
                    is_completed: isCompleted,
                    completed_at: isCompleted ? new Date().toISOString() : null,
                    score: calculateScore()
                };

                let error;
                if (userProgressId) {
                    const result = await supabase
                        .from('user_progress')
                        .update(progressData)
                        .eq('id', userProgressId);
                    error = result.error;
                } else {
                    const result = await supabase
                        .from('user_progress')
                        .insert(progressData);
                    error = result.error;
                    if (result.data && result.data.length > 0) {
                        userProgressId = result.data[0].id;
                    }
                }

                if (error) throw error;
                
                return true;
            } catch (error) {
                console.error('Ошибка сохранения прогресса:', error);
                return false;
            }
        }

        // Рассчитываем оценку
        function calculateScore() {
            if (questions.length === 0) return 0;
            
            let correctAnswers = 0;
            
            questions.forEach((question, index) => {
                if (userAnswers[index] !== undefined) {
                    if (question.type === 'test') {
                        if (userAnswers[index] === question.correct) {
                            correctAnswers++;
                        }
                    } else if (question.type === 'fill') {
                        const userAnswer = String(userAnswers[index]).toLowerCase().trim();
                        const correctAnswersList = question.answers.map(a => String(a).toLowerCase().trim());
                        if (correctAnswersList.includes(userAnswer)) {
                            correctAnswers++;
                        }
                    } else if (question.type === 'sentence') {
                        // Для предложений проверяем каждый пропуск
                        const userAnswerArray = Array.isArray(userAnswers[index]) ? userAnswers[index] : [userAnswers[index]];
                        let correctGaps = 0;
                        
                        userAnswerArray.forEach((answer, gapIndex) => {
                            const userAnswer = String(answer).toLowerCase().trim();
                            const correctAnswer = String(question.answers[gapIndex]).toLowerCase().trim();
                            if (userAnswer === correctAnswer) {
                                correctGaps++;
                            }
                        });
                        
                        // Считаем вопрос правильным, если все пропуски заполнены верно
                        if (correctGaps === question.answers.length) {
                            correctAnswers++;
                        }
                    }
                }
            });
            
            return Math.round((correctAnswers / questions.length) * 100);
        }

        // Отображаем задание
        function renderAssignment() {
            assignmentTitleEl.textContent = assignment.title;
            totalQuestionsEl.textContent = questions.length;
            
            loadingEl.style.display = 'none';
            contentEl.style.display = 'block';
            
            updateProgress();
        }

        // Показываем вопрос
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestionIndex = index;
            const question = questions[index];
            
            questionsContainerEl.innerHTML = '';
            
            const questionCard = document.createElement('div');
            questionCard.className = 'question-card';
            
            // Заголовок вопроса
            const questionHeader = document.createElement('div');
            questionHeader.className = 'question-header';
            questionHeader.innerHTML = `
                <div>
                    <div class="question-number">Вопрос ${index + 1} из ${questions.length}</div>
                    <div class="question-text">${question.q || 'Вопрос без текста'}</div>
                </div>
            `;
            questionCard.appendChild(questionHeader);
            
            // Изображение вопроса
            if (question.image) {
                const img = document.createElement('img');
                img.src = question.image;
                img.alt = 'Изображение вопроса';
                img.className = 'question-image';
                img.onerror = () => img.style.display = 'none';
                questionCard.appendChild(img);
            }
            
            // Контент вопроса в зависимости от типа
            if (question.type === 'test') {
                renderTestQuestion(question, index, questionCard);
            } else if (question.type === 'fill') {
                renderFillQuestion(question, index, questionCard);
            } else if (question.type === 'sentence') {
                renderSentenceQuestion(question, index, questionCard);
            }
            
            questionsContainerEl.appendChild(questionCard);
            currentQuestionEl.textContent = index + 1;
            
            // Обновляем навигацию
            prevBtn.style.display = index > 0 ? 'block' : 'none';
            nextBtn.style.display = index < questions.length - 1 ? 'block' : 'none';
            finishBtn.style.display = index === questions.length - 1 ? 'block' : 'none';
            
            updateProgress();
        }

        // Рендерим тестовый вопрос
        function renderTestQuestion(question, index, container) {
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';
            
            question.options.forEach((option, optionIndex) => {
                const label = document.createElement('label');
                label.className = `option-label ${userAnswers[index] === optionIndex ? 'selected' : ''}`;
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question-${index}`;
                radio.value = optionIndex;
                radio.className = 'option-radio';
                radio.checked = userAnswers[index] === optionIndex;
                
                radio.addEventListener('change', () => {
                    userAnswers[index] = optionIndex;
                    document.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                    label.classList.add('selected');
                    saveProgress();
                    updateProgress();
                });
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(option));
                optionsContainer.appendChild(label);
            });
            
            container.appendChild(optionsContainer);
        }

        // Рендерим вопрос с заполнением
        function renderFillQuestion(question, index, container) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'fill-input';
            input.placeholder = 'Введите ваш ответ...';
            input.value = userAnswers[index] || '';
            
            input.addEventListener('input', () => {
                userAnswers[index] = input.value;
                saveProgress();
                updateProgress();
            });
            
            container.appendChild(input);
        }

        // Рендерим вопрос с предложением
        function renderSentenceQuestion(question, index, container) {
            const sentenceContainer = document.createElement('div');
            sentenceContainer.className = 'sentence-container';
            
            const sentenceText = document.createElement('div');
            sentenceText.className = 'sentence-text';
            
            // Разбиваем предложение на части и заменяем ___ на инпуты
            const parts = question.sentence.split('___');
            sentenceText.innerHTML = '';
            
            parts.forEach((part, partIndex) => {
                // Добавляем текст
                if (part) {
                    sentenceText.appendChild(document.createTextNode(part));
                }
                
                // Добавляем инпут для пропуска (кроме последней части)
                if (partIndex < parts.length - 1) {
                    const gapContainer = document.createElement('span');
                    gapContainer.className = 'sentence-gap';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'sentence-input';
                    input.placeholder = `Ответ ${partIndex + 1}`;
                    
                    // Восстанавливаем сохраненный ответ
                    const savedAnswers = Array.isArray(userAnswers[index]) ? userAnswers[index] : [];
                    if (savedAnswers[partIndex] !== undefined) {
                        input.value = savedAnswers[partIndex];
                    }
                    
                    input.addEventListener('input', () => {
                        if (!Array.isArray(userAnswers[index])) {
                            userAnswers[index] = [];
                        }
                        userAnswers[index][partIndex] = input.value;
                        saveProgress();
                        updateProgress();
                    });
                    
                    gapContainer.appendChild(input);
                    sentenceText.appendChild(gapContainer);
                }
            });
            
            container.appendChild(sentenceText);
        }

        // Обновляем прогресс
        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).length;
            const progress = (answeredCount / questions.length) * 100;
            
            progressFillEl.style.width = `${progress}%`;
            progressTextEl.textContent = Math.round(progress);
        }

        // Показываем ошибку
        function showError(message) {
            loadingEl.style.display = 'none';
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Завершаем задание
        async function finishAssignment() {
            const score = calculateScore();
            const success = await saveProgress(true);
            
            if (success) {
                contentEl.style.display = 'none';
                completionEl.style.display = 'block';
                
                finalScoreEl.textContent = `${score}%`;
                
                if (score >= 80) {
                    completionMessageEl.textContent = 'Отличный результат! Вы хорошо усвоили материал.';
                } else if (score >= 60) {
                    completionMessageEl.textContent = 'Хороший результат! Есть над чем поработать.';
                } else {
                    completionMessageEl.textContent = 'Попробуйте пройти задание еще раз для лучшего результата.';
                }
            } else {
                alert('Ошибка при сохранении результата');
            }
        }

        // Обработчики событий
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        });

        finishBtn.addEventListener('click', finishAssignment);

        // Запускаем загрузку
        loadAssignment();
    </script>
</body>
</html>
